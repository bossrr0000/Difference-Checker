<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text & Link Comparator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Difference Checker</h1>
        
        <div class="input-group">
            <div class="box-wrapper">
                <div class="action-btns">
                    <button class="clear-btn" onclick="clearBox('text1')" title="Clear">x</button>
                    <button class="copy-btn" onclick="copyText('text1', this)" title="Copy">
                        <span class="icon"></span>
                    </button>
                </div>
                <div id="text1" class="editable-input" contenteditable="true" placeholder="Paste first text here..."></div>
            </div>
            <div class="box-wrapper">
                <div class="action-btns">
                    <button class="clear-btn" onclick="clearBox('text2')" title="Clear">x</button>
                    <button class="copy-btn" onclick="copyText('text2', this)" title="Copy">
                        <span class="icon"></span>
                    </button>
                </div>
                <div id="text2" class="editable-input" contenteditable="true" placeholder="Paste second text here..."></div>
            </div>
        </div>

        <button id="mainBtn" onclick="compareAndHighlight()">Check Differences</button>

        <div id="result" class="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
